<text text-anchor="start" x="112.62" y="-424.5" font-family="Helvetica,sans-Serif" font-weight="bold" font-size="10.00">Read this diagram:</text>
<text text-anchor="start" x="8" y="-414.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;• Session 은 </text>
<text text-anchor="start" x="113.75" y="-414.5" font-family="Helvetica,sans-Serif" font-weight="bold" font-size="10.00">fd&#45;당&#45;1개</text>
<text text-anchor="start" x="159.5" y="-414.5" font-family="Helvetica,sans-Serif" font-size="10.00">. 한 process 가 N device 열면 </text>
<text text-anchor="start" x="8" y="-404.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;N session (각각 다른 dev 의 </text>
<text text-anchor="start" x="185.75" y="-404.5" font-family="Helvetica,sans-Serif" font-style="italic" font-size="10.00">sessions</text>
<text text-anchor="start" x="227.75" y="-404.5" font-family="Helvetica,sans-Serif" font-size="10.00"> 리스트에). </text>
<text text-anchor="start" x="8" y="-394.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;• Proc A : font_sess_A + dz_sess_A (두 fd 열음). </text>
<text text-anchor="start" x="8" y="-384.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Proc B : jenc_sess_B (한 fd 만 열음). </text>
<text text-anchor="start" x="8" y="-374.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;• bk1 has 3 views — cross&#45;device 공유. </text>
<text text-anchor="start" x="8" y="-364.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;(font.DST · dz0.SRC · jenc.SRC) </text>
<text text-anchor="start" x="8" y="-354.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;• 각 view 는 자기 dev 의 id 공간 사용 ; backing 포인터는 공유. </text>
<text text-anchor="start" x="8" y="-344.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;• EXPORT in font/dz produced the anon_inode fd </text>
<text text-anchor="start" x="8" y="-334.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;that jenc consumed via IMPORT. </text>
